name: Android CI/CD Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Restore Keystores and Env files
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore..."
          base64 -d debug.keystore.base64 > debug.keystore
        fi
        if [ ! -f debug.keystore ]; then
          echo "Generating fallback debug.keystore using keytool..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        if [ ! -f .env ]; then
          echo "Creating .env from .env.example..."
          cp .env.example .env
        fi

    - name: Setup Gradle Wrapper if missing
      run: |
        if [ ! -f gradlew ]; then
          gradle wrapper
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WebShieldPro-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
